<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="YAMS Teachers Cooperative Society - View your monthly savings statements, profile, and more.">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YAMS Co-op">
  <link rel="apple-touch-icon" href="icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  <title>YAMS Teachers Co-op</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    :root {
      --primary: #1e3a8a;
      --primary-light: #2563eb;
      --accent-green: #6BBF3B;
      --accent-green-dark: #4a9a26;
      --bg-dark: #0f172a;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --glass-bg: rgba(30, 58, 138, 0.3);
      --glass-border: rgba(255, 255, 255, 0.1);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: var(--font);
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--primary) 50%, var(--bg-dark) 100%);
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
      color: var(--text-primary);
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ===== Main Landing Page ===== */
    .landing {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px 20px;
    }

    .app-icon {
      width: 110px;
      height: 110px;
      border-radius: 28px;
      box-shadow: 0 0 50px rgba(107, 191, 59, 0.3), var(--shadow);
      animation: iconFloat 3s ease-in-out infinite;
      margin-bottom: 28px;
    }

    @keyframes iconFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .app-title {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: 1px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 0%, var(--accent-green) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .app-subtitle {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 40px;
      max-width: 280px;
      line-height: 1.5;
    }

    /* ===== Open App Button ===== */
    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: linear-gradient(135deg, var(--accent-green) 0%, var(--accent-green-dark) 100%);
      color: white;
      border: none;
      border-radius: 14px;
      font-family: var(--font);
      font-size: 1.05rem;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 6px 25px rgba(107, 191, 59, 0.35);
      transition: all 0.3s ease;
      text-decoration: none;
      margin-bottom: 16px;
    }
    .btn-open:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 35px rgba(107, 191, 59, 0.5);
    }
    .btn-open:active {
      transform: translateY(0);
    }

    .btn-open-arrow {
      font-size: 1.2em;
      transition: transform 0.2s ease;
    }
    .btn-open:hover .btn-open-arrow {
      transform: translateX(4px);
    }

    /* ===== Install Button ===== */
    .btn-install-app {
      display: none;
      padding: 12px 32px;
      background: transparent;
      color: var(--text-secondary);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      font-family: var(--font);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-bottom: 40px;
    }
    .btn-install-app:hover {
      color: var(--text-primary);
      border-color: var(--accent-green);
      background: rgba(107, 191, 59, 0.1);
    }

    /* ===== Features ===== */
    .features {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 500px;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .feature-icon {
      font-size: 1.2em;
    }

    /* ===== Footer ===== */
    .footer {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.7rem;
      color: rgba(148, 163, 184, 0.5);
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .app-title { font-size: 1.4rem; }
      .btn-open { padding: 14px 32px; font-size: 0.95rem; }
      .features { gap: 16px; }
    }
  </style>
</head>
<body>

  <div class="landing">
    <img src="icons/icon-192x192.png" alt="YAMS Co-op" class="app-icon">
    <div class="app-title">YAMS TEACHERS CO-OP</div>
    <div class="app-subtitle">Member Financial Statement Portal — View your savings, profile & more</div>
    
    <a href="https://script.google.com/macros/s/AKfycbxcN4jQ8aefK_igXTGiPAf1CCy_PYW9ww5IN1oGOpmkB4dKJY8i9y-m5Kxspao8FQHE/exec" class="btn-open" id="btn-open">
      Open My Statement <span class="btn-open-arrow">→</span>
    </a>
    
    <button class="btn-install-app" id="btn-install" onclick="installApp()">
      📲 Install App on Phone
    </button>

    <div class="features">
      <div class="feature"><span class="feature-icon">🔒</span> Secure Google Login</div>
      <div class="feature"><span class="feature-icon">📊</span> Monthly Statements</div>
      <div class="feature"><span class="feature-icon">📱</span> Mobile Friendly</div>
      <div class="feature"><span class="feature-icon">📄</span> PDF Download</div>
    </div>
  </div>

  <div class="footer">
    YAMS Teachers Cooperative Society © 2025
  </div>

  <script>
    // ===== Service Worker Registration =====
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js')
        .then((reg) => console.log('Service Worker registered:', reg.scope))
        .catch((err) => console.warn('Service Worker registration failed:', err));
    }

    // ===== PWA Install Prompt =====
    let deferredPrompt = null;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show the install button
      document.getElementById('btn-install').style.display = 'inline-block';
    });

    function installApp() {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then((choice) => {
        if (choice.outcome === 'accepted') {
          console.log('App installed');
          document.getElementById('btn-install').style.display = 'none';
        }
        deferredPrompt = null;
      });
    }

    // Hide install button if already installed
    window.addEventListener('appinstalled', () => {
      document.getElementById('btn-install').style.display = 'none';
    });
  </script>

</body>
</html>
